<div id="ticker-container" class="dv-glass" style="width: 100vw; height: 50px; display: flex; align-items: center; overflow: hidden; position: relative; border-bottom: 2px solid var(--accent);">
  <div id="ticker-label" style="background: var(--accent); color: white; padding: 0 20px; height: 100%; display: flex; align-items: center; font-weight: bold; font-size: 14px; z-index: 10; white-space: nowrap;">
    ÚLTIMA HORA
  </div>
  <div id="ticker-track" style="display: flex; white-space: nowrap; padding-left: 20px;">
    <span id="ticker-text" style="color: white; font-size: 20px; text-transform: uppercase; font-weight: 500;"></span>
    <!-- El JS duplicará el texto para el efecto de loop infinito si es necesario -->
    <span id="ticker-text-copy" style="color: white; font-size: 20px; text-transform: uppercase; font-weight: 500; margin-left: 50px;"></span>
  </div>
</div>
