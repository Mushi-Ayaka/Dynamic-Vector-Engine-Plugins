<div id="scoreboard" class="dv-glass" style="display: flex; height: 50px; min-width: 450px; overflow: hidden; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
  
  <!-- Equipo A -->
  <div style="flex: 1; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); padding: 0 15px;">
    <span id="team-a-name" style="color: white; font-weight: bold; text-transform: uppercase; font-size: 16px;"></span>
  </div>

  <!-- Score Central -->
  <div style="width: 120px; display: flex; background: var(--accent); position: relative;">
    <div style="flex: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: white;" id="team-a-score">0</div>
    <div style="width: 1px; height: 60%; background: rgba(255,255,255,0.3); align-self: center;"></div>
    <div style="flex: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: white;" id="team-b-score">0</div>
  </div>

  <!-- Equipo B -->
  <div style="flex: 1; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); padding: 0 15px;">
    <span id="team-b-name" style="color: white; font-weight: bold; text-transform: uppercase; font-size: 16px;"></span>
  </div>

  <!-- Timer / Info -->
  <div style="width: 100px; background: #000; display: flex; align-items: center; justify-content: center; border-left: 2px solid var(--accent);">
    <span id="match-time" class="dv-label" style="font-size: 10px; color: var(--accent);"></span>
  </div>

</div>
