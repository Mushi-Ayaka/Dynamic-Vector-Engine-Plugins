  <div id="icon-container" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--accent); border-radius: 8px;">
    <!-- Icono inyectado por JS -->
    <svg id="social-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
  </div>
  <div style="display: flex; flexDirection: column;">
    <span id="platform-name" class="dv-label" style="font-size: 10px; margin-bottom: 2px;">PLATAFORMA</span>
    <span id="user-display" style="color: white; font-weight: bold; font-size: 18px;">@usuario</span>
  </div>
</div>
