<div id="info-widget" class="dv-glass" style="display: inline-flex; align-items: center; gap: 14px; padding: 10px 20px; border-radius: 8px; border-left: 3px solid var(--accent);">
  <div id="weather-icon" style="font-size: 22px; line-height: 1;">☀️</div>
  <div style="display: flex; flex-direction: column; gap: 2px;">
    <div id="current-time" style="color: white; font-size: 26px; font-weight: 800; letter-spacing: 2px; line-height: 1;">00:00</div>
    <div style="display: flex; gap: 8px; align-items: center;">
      <span id="current-location" class="dv-label" style="font-size: 11px; letter-spacing: 1px;"></span>
      <span style="color: rgba(255,255,255,0.3); font-size: 10px;">•</span>
      <span id="current-temp" style="color: var(--accent); font-size: 13px; font-weight: 700;"></span>
    </div>
  </div>
</div>
